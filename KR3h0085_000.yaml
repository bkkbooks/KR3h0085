body:
  text: 嘯堂集古録譜録類一器物之屬提要臣等謹案嘯堂集古録二卷宋王俅撰俅字子辨一作球字夔玉米芾畫史又作夔石未詳孰是陳振孫書録解題謂李邴序祇稱故人長孺之子未詳其為何王氏考邴序稱與長孺同鄉關邴籍濟州任城則俅為齊人可知是編録古尊彛敦卣之屬自商迄漢凡數百種摹其欵識各以今文釋之中有古印章數十其一曰夏禹元吾衍學古編謂係漢巫厭水災法印世俗傳有渡水佩禹字法此印乃漢篆故知之衍精於鑒古當得其實衍又謂滕公墓銘鬱鬱作兩字書與古法叠字止作二小畫者不同知其僞則是書固真贋雜糅然所採托尚足資考鑒不能以一二疵纍廢之蓋居千百年下而辨别千百年上之遺器其物或真或不真其說亦或確或不確自考古圖以下大勢類然亦不但此書也乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀嘯堂集古録原序長孺之子王俅子辨見過出書二巨編皆類鐘鼎字甚富名嘯堂集古録且謂豫曰俅不揆留意於此久矣自幼至今每得一器欵識必摸本而投之篋積三十餘年凡得數篋則又芟夷剪截獨留善者編次之其志猶以謂未足也他日再獲古文奇字即續於卷末將示子孫永為家寶豫與長孺同師同舍同鄉閭又為同年進士兩家契故甚密子辨幼警悟不類常兒長年好學工文鄉先生皆稱異之又精於古字四方人士以絹素相求者門無虛日豫既喜故人之有子復熟觀此二編大慰平昔所願欲而不得者子辨欲豫文傳信將來豫欣然為叙卷首而歸其書云雲龕小隱李邴漢老序
