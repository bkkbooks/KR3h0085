body:
  text: 書嘯堂集古録後武王戒書鑑矛等銘凡十有四規警備至成書具在廼知古人一械一物必有頴識非特文字刻畫之為諒也吕劉相嬗日益趍便簡器用淪圮更百千載如嶧山火泐石鼔泥蟠何可勝紀先正歐陽文忠先生始集名碑遺篆而録之盖精力斯盡而所著無幾元祐以竣地不愛寳頹堤廢墓堙鼎藏敦所觸呈露由是考古博古之書生焉盖盈編鱗秩而包羅莫究王君子併嘯堂集古最為後出然而竒文名蹟自商及秦纍纍凡數百章尤為精夥初不曉其前晦而今見意者天地之氣運必有與立於此否則中原故物將有不得揖讓其間之歎者此尤君子之所深感也余因得其鋟板試摘所臧邵康節秦權銘較之毫髪不舛益信子併裒類之不妄敬書于後且掇古人所為觸物存戒之意以拜之庶幾不徒字畫之泥而古意之未忘也淳熈丙申六月既望廬陵曽機伯虞謹識
